name: flash
description: "Flash - Professional E-hailing Driver Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.5.1
  
  # Navigation & Routing
  go_router: ^14.0.0
  
  # API & Networking
  dio: ^5.3.1
  retrofit: ^4.1.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.1
  
  # Location & Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.0
  geocoding: ^2.1.0
  
  # Authentication
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  google_sign_in: ^6.2.0
  
  # Payment Integration
  flutter_stripe: ^9.4.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Notifications
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.2.0
  
  # Image Picking
  image_picker: ^1.0.4
  
  # Camera
  camera: ^0.10.5
  
  # Permissions
  permission_handler: ^11.4.4
  
  # Logging & Analytics
  firebase_analytics: ^10.7.0
  logger: ^2.0.2+1
  
  # Connectivity
  connectivity_plus: ^5.0.0
  internet_connection_checker: ^1.0.0+1
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Animations
  animations: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  retrofit_generator: ^8.1.0
  
  # Testing
  mockito: ^5.4.4
  
  # Code Quality
  analysis_runner: ^0.1.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
