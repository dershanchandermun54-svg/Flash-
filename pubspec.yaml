name: flash
description: "Flash - Professional E-hailing Driver Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  
  # State Management
  provider: ^6.1.2
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  
  # Navigation & Routing
  go_router: ^14.8.0
  
  # API & Networking
  dio: ^5.10.0
  retrofit: ^4.9.2
  
  # Local Storage
  hive_ce: ^2.10.0
  hive_ce_flutter: ^2.2.0
  shared_preferences: ^2.3.5
  
  # Location & Maps
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  
  # Authentication
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2
  
  # Payment Integration
  flutter_stripe: ^11.4.0
  
  # Date & Time
  intl: ^0.20.2
  
  # Notifications
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  
  # Image Picking
  image_picker: ^1.1.2
  
  # Camera
  camera: ^0.11.1
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Logging & Analytics
  firebase_analytics: ^11.4.3
  logger: ^2.5.0
  
  # Connectivity
  connectivity_plus: ^6.1.3
  internet_connection_checker_plus: ^2.5.2
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # Animations
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.15
  hive_ce_generator: ^1.9.2
  retrofit_generator: ^10.2.4
  
  # Testing
  mockito: ^5.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
